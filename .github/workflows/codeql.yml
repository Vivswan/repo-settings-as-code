# This file is managed by Vivswan/repo-platform.
# Local edits may be replaced during template updates.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  codeql-javascript:
    uses: Vivswan/repo-platform/.github/workflows/reusable-codeql.yml@main
    with:
      language: javascript-typescript
      # lib/ is the committed generated bundle (src plus vendored deps); its
      # source is already scanned, and the bundler emits syntax CodeQL's
      # parser rejects (rest-parameter destructuring in a vendored util shim).
      config: |
        paths-ignore:
          - lib
    permissions:
      contents: read
      security-events: write
      actions: read
