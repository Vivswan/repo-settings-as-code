# Manual repair tool for the moving major tag. The Release Please workflow
# moves it on every release; dispatch this only when that step failed or a
# tag needs to be pointed somewhere else by hand.
name: Retag Major

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to move the major tag to (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Move the major tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::'$TAG' is not a vX.Y.Z release tag; skipping"
            exit 0
          fi
          major="${TAG%%.*}"
          git config user.name "settings-as-code-release"
          git config user.email "settings-as-code-release@users.noreply.github.com"
          git tag -f "$major" "refs/tags/$TAG^{}"
          git push --force origin "refs/tags/$major"
          echo "moved $major -> $TAG"
