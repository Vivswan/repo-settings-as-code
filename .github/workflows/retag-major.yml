# Consumers pin `uses: Vivswan/repo-settings-as-code@v1`; move the major tag to
# each release so they get fixes without changing their pin.
name: Retag Major

# NOTE: releases published with the default GITHUB_TOKEN do not trigger the
# `release` event; use the manual dispatch after such releases.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to move the major tag to (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Move the major tag
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::notice::'$TAG' is not a vX.Y.Z release tag; skipping"
            exit 0
          fi
          major="${TAG%%.*}"
          git config user.name "settings-as-code-release"
          git config user.email "settings-as-code-release@users.noreply.github.com"
          git tag -f "$major" "refs/tags/$TAG^{}"
          git push --force origin "refs/tags/$major"
          echo "moved $major -> $TAG"
