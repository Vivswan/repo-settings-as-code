# Envelope pagination plus enable/disable behavior. The workflows list is
# returned in a {total_count, workflows} envelope and paginated at 100 per
# page, so a 101-entry live list forces a second page (page=2). One active
# workflow is disabled and one disabled workflow is enabled; after apply both
# match their declared state, so a check rerun converges. (The deleted-state
# 'treated as absent' case lives in workflows-check-drift, because a declared
# workflow with no file is persistent drift and cannot converge.)
name: workflows-paginate-toggle-converges
settings:
  workflows:
    - path: .github/workflows/ci.yml
      state: disabled
    - path: .github/workflows/release.yml
      state: active
live_state:
  workflows:
    - {id: 1, name: CI, path: .github/workflows/ci.yml, state: active}
    - {id: 2, name: Release, path: .github/workflows/release.yml, state: disabled_manually}
    - {id: 100, name: Filler100, path: .github/workflows/filler-100.yml, state: active}
